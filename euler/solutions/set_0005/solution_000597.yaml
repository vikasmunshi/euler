name: torpids
number: 597
problem_statement: "The Torpids are rowing races held annually in Oxford, following\
  \ some curious\nrules:   A division consists of n boats (typically 13), placed in\
  \ order based on\npast performance.  All boats within a division start at 40 metre\
  \ intervals along\nthe river, in order with the highest-placed boat starting furthest\
  \ upstream.\nThe boats all start rowing simultaneously, upstream, trying to catch\
  \ the boat in\nfront while avoiding being caught by boats behind.  Each boat continues\
  \ rowing\nuntil either it reaches the finish line or it catches up with (\"bumps\"\
  ) a boat\nin front.  The finish line is a distance L metres (the course length,\
  \ in reality\nabout 1800 metres) upstream from the starting position of the lowest-placed\n\
  boat. (Because of the staggered starting positions, higher-placed boats row a\n\
  slightly shorter course than lower-placed boats.)  When a \"bump\" occurs, the\n\
  \"bumping\" boat takes no further part in the race. The \"bumped\" boat must\ncontinue,\
  \ however, and may even be \"bumped\" again by boats that started two or\nmore places\
  \ behind it.  After the race, boats are assigned new places within the\ndivision,\
  \ based on the bumps that occurred. Specifically, for any boat A that\nstarted in\
  \ a lower place than B, then A will be placed higher than B in the new\norder if\
  \ and only if one of the following occurred:    A bumped B directly   A\nbumped\
  \ another boat that went on to bump B   A bumped another boat, that bumped\nyet\
  \ another boat, that bumped B   etc NOTE: For the purposes of this problem you\n\
  may disregard the boats' lengths, and assume that a bump occurs precisely when\n\
  the two boats draw level. (In reality, a bump is awarded as soon as physical\ncontact\
  \ is made, which usually occurs when there is much less than a full boat\nlength's\
  \ overlap.)   Suppose that, in a particular race, each boat B_j rows at a\nsteady\
  \ speed v_j = -logX_j metres per second, where the X_j are chosen randomly\n(with\
  \ uniform distribution) between 0 and 1, independently from one another.\nThese\
  \ speeds are relative to the riverbank: you may disregard the flow of the\nriver.\
  \   Let p(n,L) be the probability that the new order is an even permutation\nof\
  \ the starting order, when there are n boats in the division and L is the\ncourse\
  \ length.   For example, with n=3 and L=160, labelling the boats as A,B,C\nin starting\
  \ order with C highest, the different possible outcomes of the race\nare as follows:\
  \   Bumps occurring   New order   Permutation   Probability   none\nA, B, C   even\
  \   4/15   B bumps C   A, C, B   odd   8/45   A bumps B   B, A, C\nodd   1/3   \_\
  \ \_ B bumps C, then A bumps C \_ \_   C, A, B   even   4/27   \_ \_ A\nbumps B,\
  \ then B bumps C \_ \_   C, B, A   odd   2/27   Therefore, p(3,160) = 4/15\n+ 4/27\
  \ = 56/135.   You are also given that p(4,400)=0.5107843137, rounded to 10\ndigits\
  \ after the decimal point.   Find p(13,1800) rounded to 10 digits after the\ndecimal\
  \ point.\n"
