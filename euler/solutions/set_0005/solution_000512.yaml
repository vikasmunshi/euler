name: sums_of_totients_of_powers
number: 512
problem_statement: |
  Let \varphi(n) be Euler's totient function. Let
  f(n)=(\sum_{i=1}^{n}\varphi(n^i)) \bmod (n+1). Let g(n)=\sum_{i=1}^{n} f(i).
  g(100)=2007.   Find g(5 * 10^8).
