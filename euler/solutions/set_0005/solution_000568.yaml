name: reciprocal_games_ii
number: 568
problem_statement: "Tom has built a random generator that is connected to a row of\
  \ n light bulbs.\nWhenever the random generator is activated each of the n lights\
  \ is turned on\nwith the probability of \\frac 1 2, independently of its former\
  \ state or the\nstate of the other light bulbs. While discussing with his friend\
  \ Jerry how to\nuse his generator, they invent two different games, they call the\
  \ reciprocal\ngames: Both games consist of n turns. Each turn is started by choosing\
  \ a number\nk randomly between (and including) 1 and n, with equal probability of\
  \ \\frac 1 n\nfor each number, while the possible win for that turn is the reciprocal\
  \ of k,\nthat is \\frac 1 k. In game A, Tom activates his random generator once\
  \ in each\nturn. If the number of lights turned on is the same as the previously\
  \ chosen\nnumber k, Jerry wins and gets \\frac 1 k, otherwise he will receive nothing\
  \ for\nthat turn. Jerry's expected win after playing the total game A consisting\
  \ of n\nturns is called J_A(n). For example J_A(6)=0.39505208, rounded to 8 decimal\n\
  places. For each turn in game B, after k has been randomly selected, Tom keeps\n\
  reactivating his random generator until exactly k lights are turned on. After\n\
  that Jerry takes over and reactivates the random generator until he, too, has\n\
  generated a pattern with exactly k lights turned on. If this pattern is\nidentical\
  \ to Tom's last pattern, Jerry wins and gets \\frac 1 k, otherwise he\nwill receive\
  \ nothing. Jerry's expected win after the total game B consisting of\nn turns is\
  \ called J_B(n). For example J_B(6)=0.43333333, rounded to 8 decimal\nplaces. Let\
  \ D(n)=J_B(n)\u2212J_A(n). For example, D(6) = 0.03828125. Find the 7 most\nsignificant\
  \ digits of D(123456789) after removing all leading zeros. (If, for\nexample, we\
  \ had asked for the 7 most significant digits of D(6), the answer\nwould have been\
  \ 3828125.)\n"
