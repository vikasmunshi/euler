name: distinct_colourings_of_a_rubik_s_cube
number: 599
problem_statement: "The well-known Rubik's Cube puzzle has many fascinating mathematical\
  \ properties.\nThe 2\xD72\xD72 variant has 8 cubelets with a total of 24 visible\
  \ faces, each with a\ncoloured sticker. Successively turning faces will rearrange\
  \ the cubelets,\nalthough not all arrangements of cubelets are reachable without\
  \ dismantling the\npuzzle.   Suppose that we wish to apply new stickers to a 2\xD7\
  2\xD72 Rubik's cube in\na non-standard colouring. Specifically, we have n different\
  \ colours available\n(with an unlimited supply of stickers of each colour), and\
  \ we place one sticker\non each of the 24 faces in any arrangement that we please.\
  \ We are not required\nto use all the colours, and if desired the same colour may\
  \ appear in more than\none face of a single cubelet.   We say that two such colourings\
  \ c_1,c_2 are\nessentially distinct if a cube coloured according to c_1 cannot be\
  \ made to match\na cube coloured according to c_2 by performing mechanically possible\
  \ Rubik's\nCube moves.   For example, with two colours available, there are 183\
  \ essentially\ndistinct colourings.   How many essentially distinct colourings are\
  \ there with\n10 different colours available?\n"
