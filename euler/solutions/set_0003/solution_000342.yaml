name: the_totient_of_a_square_is_a_cube
number: 342
problem_statement: |
  Consider the number 50. 50^2 = 2500 = 2^2 * 5^4, so \phi(2500) = 2 * 4 * 5^3 = 8
  * 5^3 = 2^3 * 5^3. 1 So 2500 is a square and \phi(2500) is a cube.   Find the
  sum of all numbers n, 1 \lt n \lt 10^{10} such that \phi(n^2) is a cube.   1
  \phi denotes Euler's totient function.
