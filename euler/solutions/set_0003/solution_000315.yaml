name: digital_root_clocks
number: 315
problem_statement: "Sam and Max are asked to transform two digital clocks into two\
  \ \"digital root\"\nclocks. A digital root clock is a digital clock that calculates\
  \ digital roots\nstep by step. When a clock is fed a number, it will show it and\
  \ then it will\nstart the calculation, showing all the intermediate values until\
  \ it gets to the\nresult. For example, if the clock is fed the number 137, it will\
  \ show: \"137\" \u2192\n\"11\" \u2192 \"2\" and then it will go black, waiting for\
  \ the next number. Every digital\nnumber consists of some light segments: three\
  \ horizontal (top, middle, bottom)\nand four vertical (top-left, top-right, bottom-left,\
  \ bottom-right). Number \"1\"\nis made of vertical top-right and bottom-right, number\
  \ \"4\" is made by middle\nhorizontal and vertical top-left, top-right and bottom-right.\
  \ Number \"8\" lights\nthem all. The clocks consume energy only when segments are\
  \ turned on/off. To\nturn on a \"2\" will cost 5 transitions, while a \"7\" will\
  \ cost only 4 transitions.\nSam and Max built two different clocks. Sam's clock\
  \ is fed e.g. number 137: the\nclock shows \"137\", then the panel is turned off,\
  \ then the next number (\"11\") is\nturned on, then the panel is turned off again\
  \ and finally the last number (\"2\")\nis turned on and, after some time, off. For\
  \ the example, with number 137, Sam's\nclock requires:\"137\" : (2 + 5 + 4) \xD7\
  \ 2 = 22 transitions (\"137\" on/off). \"11\" :\n(2 + 2) \xD7 2 = 8 transitions\
  \ (\"11\" on/off). \"2\" : (5) \xD7 2 = 10 transitions (\"2\"\non/off).  For a grand\
  \ total of 40 transitions.  Max's clock works differently.\nInstead of turning off\
  \ the whole panel, it is smart enough to turn off only\nthose segments that won't\
  \ be needed for the next number. For number 137, Max's\nclock requires:\"137\" :\
  \ 2 + 5 + 4 = 11 transitions (\"137\" on) 7 transitions (to\nturn off the segments\
  \ that are not needed for number \"11\"). \"11\" : 0 transitions\n(number \"11\"\
  \ is already turned on correctly) 3 transitions (to turn off the\nfirst \"1\" and\
  \ the bottom part of the second \"1\";  the top part is common with\nnumber \"2\"\
  ). \"2\" : 4 transitions (to turn on the remaining segments in order to\nget a \"\
  2\") 5 transitions (to turn off number \"2\").  For a grand total of 30\ntransitions.\
  \  Of course, Max's clock consumes less power than Sam's one. The two\nclocks are\
  \ fed all the prime numbers between A = 107 and B = 2\xD7107.  Find the\ndifference\
  \ between the total number of transitions needed by Sam's clock and\nthat needed\
  \ by Max's one.\n"
