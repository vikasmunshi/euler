problem_statement: "- A Sierpi\u0144ski graph of order-1 (S_1) is an equilateral triangle.\
  \ - S_{n + 1} is\nobtained from S_n by positioning three copies of S_n so that every\
  \ pair of\ncopies has one common corner.   Let C(n) be the number of cycles that\
  \ pass\nexactly once through all the vertices of S_n. For example, C(3) = 8 because\n\
  eight such cycles can be drawn on S_3, as shown below:   It can also be verified\n\
  that : C(1) = C(2) = 1 C(5) = 71328803586048 C(10\\,000) \\bmod 10^8 = 37652224\n\
  C(10\\,000) \\bmod 13^8 = 617720485 Find C(C(C(10\\,000))) \\bmod 13^8.\n"
