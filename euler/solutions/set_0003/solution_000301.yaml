name: nim
number: 301
problem_statement: "Nim is a game played with heaps of stones, where two players take\
  \ it in turn to\nremove any number of stones from any heap until no stones remain.\
  \ We'll consider\nthe three-heap normal-play version of Nim, which works as follows:\
  \ At the start\nof the game there are three heaps of stones. On each player's turn,\
  \ the player\nmay remove any positive number of stones from any single heap. The\
  \ first player\nunable to move (because no stones remain) loses. If (n_1,n_2,n_3)\
  \ indicates a\nNim position consisting of heaps of size n_1, n_2, and n_3, then\
  \ there is a\nsimple function, which you may look up or attempt to deduce for yourself,\n\
  X(n_1,n_2,n_3) that returns: zero if, with perfect strategy, the player about to\n\
  move will eventually lose; or non-zero if, with perfect strategy, the player\nabout\
  \ to move will eventually win. For example X(1,2,3) = 0 because, no matter\nwhat\
  \ the current player does, the opponent can respond with a move that leaves\ntwo\
  \ heaps of equal size, at which point every move by the current player can be\n\
  mirrored by the opponent until no stones remain; so the current player loses. To\n\
  illustrate: current player moves to (1,2,1) opponent moves to (1,0,1) current\n\
  player moves to (0,0,1) opponent moves to (0,0,0), and so wins. For how many\npositive\
  \ integers n\u2009\\le\u20092^{30} does X(n,2n,3n) = 0 ?\n"
