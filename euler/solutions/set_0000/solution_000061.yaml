name: cyclical_figurate_numbers
number: 61
problem_statement: "Triangle, square, pentagonal, hexagonal, heptagonal, and octagonal\
  \ numbers are\nall figurate (polygonal) numbers and are generated by the following\
  \ formulae:\nTriangle \_ P_{3,n}=n(n+1)/2 \_ 1, 3, 6, 10, 15, ... Square \_ P_{4,n}=n^2\
  \ \_ 1, 4,\n9, 16, 25, ... Pentagonal \_ P_{5,n}=n(3n-1)/2 \_ 1, 5, 12, 22, 35,\
  \ ... Hexagonal\n P_{6,n}=n(2n-1) \_ 1, 6, 15, 28, 45, ... Heptagonal \_ P_{7,n}=n(5n-3)/2\
  \ \_ 1, 7,\n18, 34, 55, ... Octagonal \_ P_{8,n}=n(3n-2) \_ 1, 8, 21, 40, 65, ...\
  \ The ordered\nset of three 4-digit numbers: 8128, 2882, 8281, has three interesting\n\
  properties. The set is cyclic, in that the last two digits of each number is the\n\
  first two digits of the next number (including the last number with the first).\n\
  Each polygonal type: triangle (P_{3,127}=8128), square (P_{4,91}=8281), and\npentagonal\
  \ (P_{5,44}=2882), is represented by a different number in the set.\nThis is the\
  \ only set of 4-digit numbers with this property. Find the sum of the\nonly ordered\
  \ set of six cyclic 4-digit numbers for which each polygonal type:\ntriangle, square,\
  \ pentagonal, hexagonal, heptagonal, and octagonal, is\nrepresented by a different\
  \ number in the set.\n"
