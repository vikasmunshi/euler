name: reversible_prime_squares
number: 808
problem_statement: |
  Both 169 and 961 are the square of a prime. 169 is the reverse of 961.   We call
  a number a reversible prime square if:  It is not a palindrome, and It is the
  square of a prime, and Its reverse is also the square of a prime.   169 and 961
  are not palindromes, so both are reversible prime squares.   Find the sum of the
  first 50 reversible prime squares.
