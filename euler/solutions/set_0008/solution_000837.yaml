name: amidakuji
number: 837
problem_statement: "Amidakuji (Japanese: \u963F\u5F25\u9640\u7C64) is a method for\
  \ producing a random permutation of a\nset of objects.  In the beginning, a number\
  \ of parallel vertical lines are\ndrawn, one for each object. Then a specified number\
  \ of horizontal rungs are\nadded, each lower than any previous rungs. Each rung\
  \ is drawn as a line segment\nspanning a randomly select pair of adjacent vertical\
  \ lines.  For example, the\nfollowing diagram depicts an Amidakuji with three objects\
  \ (A, B, C) and six\nrungs:     The coloured lines in the diagram illustrate how\
  \ to form the\npermutation. For each object, starting from the top of its vertical\
  \ line, trace\ndownwards but follow any rung encountered along the way, and record\
  \ which\nvertical we end up on. In this example, the resulting permutation happens\
  \ to be\nthe identity: A\\mapsto A, B\\mapsto B, C\\mapsto C.  Let a(m, n) be the\
  \ number of\ndifferent three-object Amidakujis that have m rungs between A and B,\
  \ and n rungs\nbetween B and C, and whose outcome is the identity permutation. For\
  \ example,\na(3, 3) = 2, because the Amidakuji shown above and its mirror image\
  \ are the only\nones with the required property.  You are also given that a(123,\
  \ 321) \\equiv\n172633303 \\pmod{1234567891}.  Find a(123456789, 987654321). Give\
  \ your answer\nmodulo 1234567891.\n"
