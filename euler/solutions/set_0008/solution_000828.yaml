name: numbers_challenge
number: 828
problem_statement: "It is a common recreational problem to make a target number using\
  \ a selection of\nother numbers. In this problem you will be given six numbers and\
  \ a target\nnumber. For example, given the six numbers 2, 3, 4, 6, 7, 25, and a\
  \ target of\n211, one possible solution is: 211 = (3+6)* 25 \u2212 (4*7)\\div 2\
  \ This uses all six\nnumbers. However, it is not necessary to do so. Another solution\
  \ that does not\nuse the 7 is: 211 = (25\u22122)* (6+3) + 4  Define the score of\
  \ a solution to be the\nsum of the numbers used. In the above example problem, the\
  \ two given solutions\nhave scores 47 and 40 respectively. It turns out that this\
  \ problem has no\nsolutions with score less than 40. When combining numbers, the\
  \ following rules\nmust be observed:  Each available number may be used at most\
  \ once. Only the four\nbasic arithmetic operations are permitted: +, -, *, \\div.\
  \ All intermediate\nvalues must be positive integers, so for example (3\\div 2)\
  \ is never permitted as\na subexpression (even if the final answer is an integer).\
  \  The attached file\nnumber-challenges.txt contains 200 problems, one per line\
  \ in the format:\n211:2,3,4,6,7,25 where the number before the colon is the target\
  \ and the\nremaining comma-separated numbers are those available to be used. Numbering\
  \ the\nproblems 1, 2, ..., 200, we let s_n be the minimum score of the solution\
  \ to the\nnth problem. For example, s_1=40, as the first problem in the file is\
  \ the\nexample given above. Note that not all problems have a solution; in such\
  \ cases\nwe take s_n=0. Find \\displaystyle\\sum_{n=1}^{200} 3^n s_n. Give your\
  \ answer\nmodulo 1005075251.\n"
