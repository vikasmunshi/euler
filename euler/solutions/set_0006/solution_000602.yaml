name: product_of_head_counts
number: 602
problem_statement: "Alice enlists the help of some friends to generate a random number,\
  \ using a\nsingle unfair coin. She and her friends sit around a table and, starting\
  \ with\nAlice, they take it in turns to toss the coin. Everyone keeps a count of\
  \ how\nmany heads they obtain individually. The process ends as soon as Alice obtains\
  \ a\nHead. At this point, Alice multiplies all her friends' Head counts together\
  \ to\nobtain her random number.   As an illustration, suppose Alice is assisted\
  \ by\nBob, Charlie, and Dawn, who are seated round the table in that order, and\
  \ that\nthey obtain the sequence of Head/Tail outcomes THHH\u2014TTTT\u2014THHT\u2014\
  H beginning and\nending with Alice. Then Bob and Charlie each obtain 2 heads, and\
  \ Dawn obtains 1\nhead. Alice's random number is therefore 2* 2* 1 = 4.   Define\
  \ e(n, p) to be the\nexpected value of Alice's random number, where n is the number\
  \ of friends\nhelping (excluding Alice herself), and p is the probability of the\
  \ coin coming\nup Tails.   It turns out that, for any fixed n, e(n, p) is always\
  \ a polynomial\nin p. For example, e(3, p) = p^3 + 4p^2 + p.   Define c(n, k) to\
  \ be the\ncoefficient of p^k in the polynomial e(n, p). So c(3, 1) = 1, c(3, 2)\
  \ = 4, and\nc(3, 3) = 1.   You are given that c(100, 40) \\equiv 986699437 \\text{\
  \ }\n(\\text{mod } 10^9+7).   Find c(10000000, 4000000) \\mod 10^9+7.\n"
