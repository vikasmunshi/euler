name: long_substring_with_many_repetitions
number: 691
problem_statement: "Given a character string s, we define L(k,s) to be the length\
  \ of the longest\nsubstring of s which appears at least k times in s, or 0 if such\
  \ a substring\ndoes not exist. For example, L(3,\\text{\u201Cbbabcabcabcacba\u201D\
  })=4 because of the\nthree occurrences of the substring \\text{\u201Cabca\u201D\
  }, and\nL(2,\\text{\u201Cbbabcabcabcacba\u201D})=7 because of the repeated substring\n\
  \\text{\u201Cabcabca\u201D}. Note that the occurrences can overlap. Let a_n, b_n\
  \ and c_n be\nthe 0/1 sequences defined by: a_0 = 0 a_{2n} = a_{n} a_{2n+1} = 1-a_{n}\
  \ b_n =\n\\lfloor\\frac{n+1}{\\varphi}\\rfloor - \\lfloor\\frac{n}{\\varphi}\\rfloor\
  \ (where\n\\varphi is the golden ratio) c_n = a_n + b_n - 2a_nb_n and S_n the character\n\
  string c_0\\ldots c_{n-1}. You are given that L(2,S_{10})=5, L(3,S_{10})=2,\nL(2,S_{100})=14,\
  \ L(4,S_{100})=6, L(2,S_{1000})=86, L(3,S_{1000}) = 45,\nL(5,S_{1000}) = 31, and\
  \ that the sum of non-zero L(k,S_{1000}) for k\\ge 1 is\n2460. Find the sum of non-zero\
  \ L(k,S_{5000000}) for k\\ge 1.\n"
