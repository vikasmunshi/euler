name: the_king_s_banquet
number: 669
problem_statement: "The Knights of the Order of Fibonacci are preparing a grand feast\
  \ for their\nking. There are n knights, and each knight is assigned a distinct number\
  \ from 1\nto n. When the knights sit down at the roundtable for their feast, they\
  \ follow a\npeculiar seating rule: two knights can only sit next to each other if\
  \ their\nrespective numbers sum to a Fibonacci number. When the n knights all try\
  \ to sit\ndown around a circular table with n chairs, they are unable to find a\
  \ suitable\nseating arrangement for any n>2 despite their best efforts. Just when\
  \ they are\nabout to give up, they remember that the king will sit on his throne\
  \ at the\ntable as well. Suppose there are n=7 knights and 7 chairs at the roundtable,\
  \ in\naddition to the king\u2019s throne. After some trial and error, they come\
  \ up with the\nfollowing seating arrangement (K represents the king):    Notice\
  \ that the sums\n4+1, 1+7, 7+6, 6+2, 2+3, and 3+5 are all Fibonacci numbers, as\
  \ required. It\nshould also be mentioned that the king always prefers an arrangement\
  \ where the\nknight to the his left has a smaller number than the knight to his\
  \ right. With\nthis additional rule, the above arrangement is unique for n=7, and\
  \ the knight\nsitting in the 3rd chair from the king\u2019s left is knight number\
  \ 7. Later, several\nnew knights are appointed to the Order, giving 34 knights and\
  \ chairs in addition\nto the king's throne. The knights eventually determine that\
  \ there is a unique\nseating arrangement for n=34 satisfying the above rules, and\
  \ this time knight\nnumber 30 is sitting in the 3rd chair from the king's left.\
  \ Now suppose there\nare n=99\\,194\\,853\\,094\\,755\\,497 knights and the same\
  \ number of chairs at the\nroundtable (not including the king\u2019s throne). After\
  \ great trials and\ntribulations, they are finally able to find the unique seating\
  \ arrangement for\nthis value of n that satisfies the above rules. Find the number\
  \ of the knight\nsitting in the 10\\,000\\,000\\,000\\,000\\,000th chair from the\
  \ king\u2019s left.\n"
