name: "m\xF6bius_function_and_intervals"
number: 464
problem_statement: "The M\xF6bius function, denoted \\mu(n), is defined as: \\mu(n)\
  \ = (-1)^{\\omega(n)} if\nn is squarefree (where \\omega(n) is the number of distinct\
  \ prime factors of n)\n\\mu(n) = 0 if n is not squarefree.  Let P(a, b) be the number\
  \ of integers n in\nthe interval [a, b] such that \\mu(n) = 1. Let N(a, b) be the\
  \ number of integers\nn in the interval [a, b] such that \\mu(n) = -1. For example,\
  \ P(2,10) = 2 and\nN(2,10) = 4.   Let C(n) be the number of integer pairs (a, b)\
  \ such that:  1\\le a\n\\le b \\le n,  99 \\cdot N(a, b) \\le 100 \\cdot P(a, b),\
  \ and  99 \\cdot P(a, b) \\le\n100 \\cdot N(a, b).  For example, C(10) = 13, C(500)\
  \ = 16676 and C(10\\,000) =\n20155319.   Find C(20\\,000\\,000).\n"
