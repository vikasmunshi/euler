name: heighway_dragon
number: 220
problem_statement: "Let D0 be the two-letter string \"Fa\".  For n\u22651, derive\
  \ Dn from Dn-1 by the\nstring-rewriting rules: \"a\" \u2192 \"aRbFR\" \"b\" \u2192\
  \ \"LFaLb\" Thus, D0 = \"Fa\", D1 =\n\"FaRbFR\", D2 = \"FaRbFRRLFaLbFR\", and so\
  \ on. These strings can be interpreted as\ninstructions to a computer graphics program,\
  \ with \"F\" meaning \"draw forward one\nunit\", \"L\" meaning \"turn left 90 degrees\"\
  , \"R\" meaning \"turn right 90 degrees\",\nand \"a\" and \"b\" being ignored. \
  \ The initial position of the computer cursor is\n(0,0), pointing up towards (0,1).\
  \ Then Dn is an exotic drawing known as the\nHeighway Dragon of order n.  For example,\
  \ D10 is shown below; counting each \"F\"\nas one step, the highlighted spot at\
  \ (18,16) is the position reached after 500\nsteps.   What is the position of the\
  \ cursor after 1012 steps in D50 ? Give your\nanswer in the form x,y with no spaces.\n"
