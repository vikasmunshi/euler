name: tatami_free_rooms
number: 256
problem_statement: "Tatami are rectangular mats, used to completely cover the floor\
  \ of a room,\nwithout overlap. Assuming that the only type of available tatami has\
  \ dimensions\n1 * 2, there are obviously some limitations for the shape and size\
  \ of the rooms\nthat can be covered. For this problem, we consider only rectangular\
  \ rooms with\ninteger dimensions a, b and even size s = a \\cdot b. We use the term\
  \ 'size' to\ndenote the floor surface area of the room, and \u2014 without loss\
  \ of generality \u2014 we\nadd the condition a \\le b. There is one rule to follow\
  \ when laying out tatami:\nthere must be no points where corners of four different\
  \ mats meet. For example,\nconsider the two arrangements below for a 4 * 4 room:\
  \   The arrangement on the\nleft is acceptable, whereas the one on the right is\
  \ not: a red \"X\" in the\nmiddle, marks the point where four tatami meet. Because\
  \ of this rule, certain\neven-sized rooms cannot be covered with tatami: we call\
  \ them tatami-free rooms.\nFurther, we define T(s) as the number of tatami-free\
  \ rooms of size s. The\nsmallest tatami-free room has size s = 70 and dimensions\
  \ 7 * 10. All the other\nrooms of size s = 70 can be covered with tatami; they are:\
  \ 1 * 70, 2 * 35 and 5\n* 14. Hence, T(70) = 1. Similarly, we can verify that T(1320)\
  \ = 5 because there\nare exactly 5 tatami-free rooms of size s = 1320: 20 * 66,\
  \ 22 * 60, 24 * 55, 30\n* 44 and 33 * 40. In fact, s = 1320 is the smallest room-size\
  \ s for which T(s) =\n5. Find the smallest room-size s for which T(s) = 200.\n"
