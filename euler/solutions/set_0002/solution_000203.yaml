name: squarefree_binomial_coefficients
number: 203
problem_statement: "The binomial coefficients \\displaystyle \\binom n k can be arranged\
  \ in triangular\nform, Pascal's triangle, like this:\n111121133114641151010511615201561172135352171\
  \ .........  It can be seen that the\nfirst eight rows of Pascal's triangle contain\
  \ twelve distinct numbers:\n1,\_2,\_3,\_4,\_5,\_6,\_7,\_10,\_15,\_20,\_21\_and\_\
  35. A positive integer n is called\nsquarefree if no square of a prime divides n.\
  \ Of the twelve distinct numbers in\nthe first eight rows of Pascal's triangle,\
  \ all except 4 and 20 are squarefree.\nThe sum of the distinct squarefree numbers\
  \ in the first eight rows is 105. Find\nthe sum of the distinct squarefree numbers\
  \ in the first 51 rows of Pascal's\ntriangle.\n"
