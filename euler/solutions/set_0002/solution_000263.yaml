name: an_engineers__dream_come_true
number: 263
problem_statement: "Consider the number 6. The divisors of 6 are: 1,2,3 and 6. Every\
  \ number from 1\nup to and including 6 can be written as a sum of distinct divisors\
  \ of 6: 1=1,\n2=2, 3=1+2, 4=1+3, 5=2+3, 6=6. A number n is called a practical number\
  \ if every\nnumber from 1 up to and including n can be expressed as a sum of distinct\n\
  divisors of n.   A pair of consecutive prime numbers with a difference of six is\n\
  called a sexy pair (since \"sex\" is the Latin word for \"six\"). The first sexy\n\
  pair is (23, 29).   We may occasionally find a triple-pair, which means three\n\
  consecutive sexy prime pairs, such that the second member of each pair is the\n\
  first member of the next pair.   We shall call a number n such that : (n-9,\nn-3),\
  \ (n-3,n+3), (n+3, n+9) form a triple-pair, and  the numbers n-8, n-4, n,\nn+4 and\
  \ n+8 are all practical,   an engineers\u2019 paradise.   Find the sum of the\n\
  first four engineers\u2019 paradises.\n"
