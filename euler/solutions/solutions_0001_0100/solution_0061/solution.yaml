euler_problem: 61
problem_name: cyclical_figurate_numbers
problem_statement: |4-
        Triangle, square, pentagonal, hexagonal, heptagonal, and octagonal numbers
        are all figurate (polygonal) numbers and are generated by the following
        formulae:

        Triangle: P_3,n = n(n+1)/2      1, 3, 6, 10, 15, ...
        Square:   P_4,n = n^2            1, 4, 9, 16, 25, ...
        Pentagonal: P_5,n = n(3n-1)/2    1, 5, 12, 22, 35, ...
        Hexagonal: P_6,n = n(2n-1)       1, 6, 15, 28, 45, ...
        Heptagonal: P_7,n = n(5n-3)/2    1, 7, 18, 34, 55, ...
        Octagonal: P_8,n = n(3n-2)       1, 8, 21, 40, 65, ...

        The ordered set of three 4-digit numbers: 8128, 2882, 8281, has three
        interesting properties.

        1. The set is cyclic, in that the last two digits of each number is the
           first two digits of the next number (including the last number with the
           first).
        2. Each polygonal type: triangle (P_3,127=8128), square (P_4,91=8281), and
           pentagonal (P_5,44=2882), is represented by a different number in the
           set.
        3. This is the only set of 4-digit numbers with this property.

        Find the sum of the only ordered set of six cyclic 4-digit numbers for which
        each polygonal type: triangle, square, pentagonal, hexagonal, heptagonal,
        and octagonal, is represented by a different number in the set.
solution_approach: |4-
        To solve this problem, consider each figurate number type and generate
        all 4-digit numbers for that type. Then, create a graph where each node
        represents a 4-digit figurate number, and edges connect nodes whose last two
        digits match the first two digits of another number. The task is to find a
        cycle of length six in this graph where each node corresponds to a unique
        figurate type. Use backtracking or search algorithms like depth-first search
        to explore these paths. Pay attention to uniqueness constraints on polygonal
        types and ensure all six types are included in the cycle.
