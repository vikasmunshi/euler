name: optimum_polynomial
number: 101
problem_statement: "If we are presented with the first k terms of a sequence it is\
  \ impossible to say\nwith certainty the value of the next term, as there are infinitely\
  \ many\npolynomial functions that can model the sequence. As an example, let us\
  \ consider\nthe sequence of cube numbers. This is defined by the generating function,u_n\
  \ =\nn^3: 1, 8, 27, 64, 125, 216, ... Suppose we were only given the first two terms\n\
  of this sequence. Working on the principle that \"simple is best\" we should\nassume\
  \ a linear relationship and predict the next term to be 15 (common\ndifference 7).\
  \ Even if we were presented with the first three terms, by the same\nprinciple of\
  \ simplicity, a quadratic relationship should be assumed. We shall\ndefine \\operatorname{OP}(k,\
  \ n) to be the nth term of the optimum polynomial\ngenerating function for the first\
  \ k terms of a sequence. It should be clear that\n\\operatorname{OP}(k, n) will\
  \ accurately generate the terms of the sequence for n\n\\le k, and potentially the\
  \ first incorrect term (FIT) will be\n\\operatorname{OP}(k, k+1); in which case\
  \ we shall call it a bad OP (BOP). As a\nbasis, if we were only given the first\
  \ term of sequence, it would be most\nsensible to assume constancy; that is, for\
  \ n \\ge 2, \\operatorname{OP}(1, n) =\nu_1. Hence we obtain the following \\operatorname{OP}s\
  \ for the cubic sequence:\n\\operatorname{OP}(1, n) = 1 1, {\\color{red}\\mathbf\
  \ 1}, 1, 1, ...\n\\operatorname{OP}(2, n) = 7n - 6 1, 8, {\\color{red}\\mathbf{15}},\
  \ ...\n\\operatorname{OP}(3, n) = 6n^2 - 11n + 6\_\_\_\_\_ 1, 8, 27,\n{\\color{red}\\\
  mathbf{58}}, ... \\operatorname{OP}(4, n) = n^3 1, 8, 27, 64, 125,\n...  Clearly\
  \ no BOPs exist for k \\ge 4. By considering the sum of FITs generated\nby the BOPs\
  \ (indicated in red above), we obtain 1 + 15 + 58 = 74. Consider the\nfollowing\
  \ tenth degree polynomial generating function: u_n = 1 - n + n^2 - n^3 +\nn^4 -\
  \ n^5 + n^6 - n^7 + n^8 - n^9 + n^{10}. Find the sum of FITs for the BOPs.\n"
