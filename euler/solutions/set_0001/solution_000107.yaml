problem_statement: "The following undirected network consists of seven vertices and\
  \ twelve edges\nwith a total weight of 243.   The same network can be represented\
  \ by the matrix\nbelow. \_\_\_\_ABCDEFG A-161221--- B16--1720-- C12--28-31- D211728-181923\
  \ E-20-18--\n11 F--3119--27 G---231127- However, it is possible to optimise the\
  \ network by\nremoving some edges and still ensure that all points on the network\
  \ remain\nconnected. The network which achieves the maximum saving is shown below.\
  \ It has\na weight of 93, representing a saving of 243 \u2212 93 = 150 from the\
  \ original\nnetwork.   Using network.txt (right click and 'Save Link/Target As...'),\
  \ a 6K\ntext file containing a network with forty vertices, and given in matrix\
  \ form,\nfind the maximum saving which can be achieved by removing redundant edges\
  \ whilst\nensuring that the network remains connected.\n"
