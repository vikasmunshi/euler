name: fibonacci_golden_nuggets
number: 137
problem_statement: |
  Consider the infinite polynomial series A_F(x) = x F_1 + x^2 F_2 + x^3 F_3 +
  ..., where F_k is the kth term in the Fibonacci sequence: 1, 1, 2, 3, 5, 8, ...;
  that is, F_k = F_{k-1} + F_{k-2}, F_1 = 1 and F_2 = 1. For this problem we shall
  be interested in values of x for which A_F(x) is a positive integer.
  Surprisingly\begin{align*}  A_F(\tfrac{1}{2})  &= (\tfrac{1}{2})* 1 +
  (\tfrac{1}{2})^2* 1 + (\tfrac{1}{2})^3* 2 + (\tfrac{1}{2})^4* 3 +
  (\tfrac{1}{2})^5* 5 + \cdots \\   &= \tfrac{1}{2} + \tfrac{1}{4} + \tfrac{2}{8}
  + \tfrac{3}{16} + \tfrac{5}{32} + \cdots \\  &= 2 \end{align*}  The
  corresponding values of x for the first five natural numbers are shown below.
  xA_F(x) \sqrt{2}-11 \tfrac{1}{2}2 \frac{\sqrt{13}-2}{3}3 \frac{\sqrt{89}-5}{8}4
  \frac{\sqrt{34}-3}{5}5  We shall call A_F(x) a golden nugget if x is rational,
  because they become increasingly rarer; for example, the 10th golden nugget is
  74049690. Find the 15th golden nugget.
