name: sub_triangle_sums
number: 150
problem_statement: "In a triangular array of positive and negative integers, we wish\
  \ to find a sub-\ntriangle such that the sum of the numbers it contains is the smallest\
  \ possible.\nIn the example below, it can be easily verified that the marked triangle\n\
  satisfies this condition having a sum of \u221242.   We wish to make such a\ntriangular\
  \ array with one thousand rows, so we generate 500500 pseudo-random\nnumbers sk\
  \ in the range \xB1219, using a type of random number generator (known as\na Linear\
  \ Congruential Generator) as follows: t := 0  for k = 1 up to k = 500500:\n\_ \_\
  \ t := (615949*t + 797807) modulo 220 \_ \_ sk := t\u2212219 Thus: s1 = 273519,\
  \ s2 =\n\u2212153582, s3 = 450905 etc Our triangular array is then formed using\
  \ the pseudo-\nrandom numbers thus:  s1 s2\_ s3 s4\_ s5\_ s6\_   s7\_ s8\_ s9\_\
  \ s10 ...  Sub-triangles\ncan start at any element of the array and extend down\
  \ as far as we like (taking-\nin the two elements directly below it from the next\
  \ row, the three elements\ndirectly below from the row after that, and so on). \
  \ The \"sum of a sub-triangle\"\nis defined as the sum of all the elements it contains.\
  \  Find the smallest\npossible sub-triangle sum.\n"
