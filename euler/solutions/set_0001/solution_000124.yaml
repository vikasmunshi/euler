name: ordered_radicals
number: 124
problem_statement: "The radical of n, \\operatorname{rad}(n), is the product of the\
  \ distinct prime\nfactors of n. For example, 504 = 2^3 * 3^2 * 7, so \\operatorname{rad}(504)\
  \ = 2 *\n3 * 7 = 42. If we calculate \\operatorname{rad}(n) for 1 \\le n \\le 10,\
  \ then sort\nthem on \\operatorname{rad}(n), and sorting on n if the radical values\
  \ are equal,\nwe get:   Unsorted \_ Sorted   n rad(n) \_ n rad(n) k   11 \_ 111\
  \   22 \_ 222   33 \n423   42 \_ 824   55 \_ 335   66 \_ 936   77 \_ 557   82 \_\
  \ 668   93 \_ 779   1010 \_\n101010   Let E(k) be the k-th element in the sorted\
  \ n column; for example, E(4)\n= 8 and E(6) = 9. If \\operatorname{rad}(n) is sorted\
  \ for 1 \\le n \\le 100000,\nfind E(10000).\n"
