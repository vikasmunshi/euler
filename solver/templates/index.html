<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Solutions Summary - Project Euler</title>
<style>
$color_vars

*, *::before, *::after { box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
  font-size: 14px;
  line-height: 1.5;
  color: #1e2030;
  background: #dde1ed;
  max-width: 1280px;
  margin: 0 auto;
  padding: 24px;
}

h2 { font-size: 1.35rem; font-weight: 700; color: #1e2030; margin: 0 0 8px; }
h3 { font-size: 1.05rem; font-weight: 600; color: #3a4060; margin: 24px 0 8px; border-bottom: 2px solid #dde1ed; padding-bottom: 4px; }

.summary-info {
  background: #dde1ed;
  padding: 12px 12px;
  width: 1080px;
}

.solved-grid {
  background: #dde1ed;
  padding: 2px 2px;
  width: 1080px;
}

.generated-at {
  font-size: 0.78rem;
  color: #8a8fa8;
  margin-top: 2px;
}

.problems_solved_grid {
  margin-bottom: 8px;
}


table.grid {
  border-collapse: collapse;
  margin-bottom: 2px;
}

table.grid td {
  width: 34px;
  min-width: 34px;
  height: 34px;
  text-align: center;
  vertical-align: middle;
  font-size: 0.77rem;
  font-weight: 600;
  border: 1px solid rgba(0, 0, 0, 0.08);
  padding: 0;
  position: relative;
  cursor: default;
}

table.grid td.problem_unsolved {
  background-color: #e8eaef;
  color: #9499b0;
}

table.grid td.level {
  background-color: #f0f2f8;
  color: #3a4060;
  font-weight: 700;
  font-size: 0.72rem;
  border: 1px solid #c8ccdc;
}

table.grid td.empty-cell {
  background: #f4f6fb;
  border: 1px solid #e8eaef;
}

table.grid td a {
  display: block;
  width: 100%;
  height: 100%;
  line-height: 34px;
  color: inherit;
  text-decoration: none;
}

/* Tooltip */
.tooltip { position: relative; }

.tooltiptext_narrow {
  visibility: hidden;
  opacity: 0;
  background-color: #1e2030;
  color: #fff;
  padding: 8px 10px;
  border-radius: 6px;
  font-size: 0.82rem;
  line-height: 1.5;
  position: absolute;
  z-index: 200;
  top: calc(100% + 4px);
  left: 50%;
  transform: translateX(-50%);
  width: 210px;
  box-shadow: 0 4px 14px rgba(0, 0, 0, 0.35);
  pointer-events: none;
  transition: opacity 0.15s ease;
  white-space: normal;
  word-break: break-word;
}

.tooltip:hover .tooltiptext_narrow {
  visibility: visible;
  opacity: 1;
}

.tooltiptext_narrow .tt-title { font-weight: 700; font-size: 0.88rem; margin-bottom: 3px; }
.tooltiptext_narrow .tt-diff  { font-size: 0.78rem; opacity: 0.85; }
.tooltiptext_narrow .tt-date  { font-size: 0.78rem; opacity: 0.85; color: #aed4f8; }
.tooltiptext_narrow .tt-name  { font-size: 0.82rem; margin-top: 3px; font-style: italic; }

/* 3-column row layout for "by ID" grids */
.grids-row-layout {
  display: flex;
  flex-wrap: wrap;
  gap: 20px 24px;
}

.grids-row-layout .problems_solved_grid {
  flex: 0 0 auto;
}

/* Progress bar */
.grid-progress-wrap {
  margin: 3px 0 10px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.progress_bar {
  flex: 1;
  height: 7px;
  background: #dde1ed;
  border-radius: 4px;
  overflow: hidden;
}

.progress_bar_block {
  height: 100%;
  background: #4a90d9;
  border-radius: 4px;
}

.grid-caption {
  font-size: 0.75rem;
  color: #8a8fa8;
  white-space: nowrap;
}
</style>
</head>
<body>

<div id="page-data" data-content='$history'></div>

<div class="summary-info">
  <h3>Progress Tracker</h3>
  <strong>Solved $solved_count of $total_count problems</strong>
  <div class="generated-at">Generated: $generated_at</div>
</div>

<div class="solved-grid">
$grids_by_id
</div>

<script>
(function () {
  var raw = document.getElementById('page-data').getAttribute('data-content');
  var history;
  try { history = JSON.parse(raw); } catch (e) { return; }

  function escHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  var cells = document.querySelectorAll('td[data-num]');
  for (var i = 0; i < cells.length; i++) {
    var td   = cells[i];
    var num   = td.getAttribute('data-num');
    var title = td.getAttribute('data-title') || '';
    var level = td.getAttribute('data-level');
    var pct   = td.getAttribute('data-pct');
    var solved = td.classList.contains('problem_solved');
    var span  = td.querySelector('.tooltiptext_narrow');
    if (!span) continue;

    var html = '<div class="tt-title">Problem ' + num + '</div>';
    if (level !== '' && level !== null) {
      html += '<div class="tt-diff">Difficulty: Level ' + level + ' [' + pct + '%]</div>';
    }
    if (solved && history[num]) {
      html += '<div class="tt-date">Completed on ' + escHtml(history[num]) + '</div>';
    }
    if (title) {
      html += '<div class="tt-name">&ldquo;' + escHtml(title) + '&rdquo;</div>';
    }
    span.innerHTML = html;
  }
}());
</script>

</body>
</html>
