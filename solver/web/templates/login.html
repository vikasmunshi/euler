{% extends "base.html" %}
{% block title %}euler — sign in{% endblock %}
{% block content %}
  <h1>Sign in</h1>
  <p class="lead">Zero-knowledge login (SRP): your password never leaves this browser.</p>
  <form id="login-form" class="auth-form" method="post" action="#" novalidate>
    <label for="email">Email</label>
    <input id="email" name="email" type="email" autocomplete="username" required autofocus>
    <label for="password">Password</label>
    <input id="password" name="password" type="password" autocomplete="current-password" required>
    <label class="check"><input id="remember" name="remember" type="checkbox"> Remember me on this device</label>
    <p id="form-error" class="flash flash-error" role="alert" hidden></p>
    <button id="submit" type="submit">Sign in</button>
  </form>
  <p class="muted"><a href="/forgot">Forgot your password?</a></p>
  <noscript><p class="flash flash-error">Signing in requires JavaScript (the SRP handshake runs in your browser).</p></noscript>
{% endblock %}
{% block scripts %}
  <script src="/assets/srp.js" defer></script>
  <script src="/assets/login.js" defer></script>
{% endblock %}
