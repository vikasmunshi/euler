{% extends "base.html" %}
{% block title %}euler — forgot password{% endblock %}
{% block content %}
  <h1>Forgot your password?</h1>
  <p class="lead">Enter your account email; if it exists, a reset link will be sent.</p>
  <form class="auth-form" method="post" action="/forgot">
    <label for="email">Email</label>
    <input id="email" name="email" type="email" autocomplete="username" required autofocus>
    <button type="submit">Send reset link</button>
  </form>
  <p class="muted"><a href="/login">Back to sign in</a></p>
{% endblock %}
