{% extends "base.html" %}
{% block title %}{{ filename }} · euler{% endblock %}
{% block content %}
<section class="panel">
  <h1><code>{{ filename }}</code></h1>
  <p class="meta"><span class="muted">problem {{ number }} · {{ lines }} lines</span></p>
  <pre class="code-block"><code>{{ text }}</code></pre>
</section>
{% endblock %}
