{% extends "base.html" %}
{% block title %}{{ title }} · euler{% endblock %}
{% block content %}
<section class="panel">
  {% if body %}
  <div class="doc-body">{{ body | safe }}</div>
  {% else %}
  <h1>{{ title }}</h1>
  <pre class="code-block">{{ text }}</pre>
  {% endif %}
</section>
{% endblock %}
