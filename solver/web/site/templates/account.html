{% extends "base.html" %}
{% block title %}ς euler — account{% endblock %}
{% block content %}
<section class="panel">
  <h1>Account</h1>
  {% if subject %}
  <dl class="account">
    <dt>Signed in as</dt><dd><strong>{{ subject.user or 'anon' }}</strong></dd>
    <dt>Profile</dt><dd><span class="pill pill-{{ subject.profile }}">{{ subject.profile }}</span></dd>
    <dt>Permissions</dt>
    <dd class="perm-list">
      {% for p in subject.permissions | sort %}<code>{{ p }}</code>{% endfor %}
    </dd>
  </dl>
  {% endif %}
</section>
{% endblock %}
