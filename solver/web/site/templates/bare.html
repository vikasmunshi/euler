{# A minimal standalone page: just the document, no shell, no chrome — what the
   footer popup windows show (render()'s ?bare mode). Theme-aware via site.js. #}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title | default('euler') }}</title>
  <meta name="robots" content="noindex">
  <link rel="stylesheet" href="/assets/site.css">
  <link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='-1.3%20-1.35%202.6%201.75'%3E%3Cpath%20d='M%201%200%20A%201%201%200%200%200%20-1%200%20M%20-1%200%20H%200'%20fill='none'%20stroke='%23f97316'%20stroke-width='0.16'%20stroke-linecap='round'/%3E%3Ccircle%20cx='0'%20cy='0'%20r='0.1'%20fill='%23f97316'/%3E%3C/svg%3E">
  <script src="/assets/site.js"></script>
</head>
<body class="bare">
  <main class="bare-main">{{ body | safe }}</main>
</body>
</html>
