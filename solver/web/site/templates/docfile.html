{% extends "base.html" %}
{% block title %}{{ path }} · euler{% endblock %}
{% block content %}
<section class="panel">
  <h1><code>{{ path }}</code></h1>
  {# The back-step is the header breadcrumb (`docs ›`); the page shows only its own metric. #}
  <p class="meta"><span class="muted">{{ lines }} lines</span></p>
  <pre class="code-block"><code>{{ text }}</code></pre>
</section>
{% endblock %}
