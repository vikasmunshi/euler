<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{TITLE}} — solver docs</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/common.css">
    <link rel="stylesheet" href="/vendor/highlight.css">
    <link rel="stylesheet" href="/docs.css">
    <!-- header.js reports this page's context to the workspace shell's command bar. -->
    <script defer src="/header.js"></script>
    <script defer src="/vendor/highlight.min.js"></script>
</head>
<body>
<div id="page">
    <!-- Server-rendered Markdown (markdown-it-py); headings carry update_doc.py's
         slug ids so in-page and cross-guide anchors resolve. -->
    <article id="doc" class="markdown-body">{{CONTENT}}</article>
</div>
<!-- Highlight fenced code once the deferred highlight.min.js has run. -->
<script>window.addEventListener('DOMContentLoaded', () => { if (window.hljs) hljs.highlightAll(); });</script>
</body>
</html>
