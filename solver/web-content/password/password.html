<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>solver · change password</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/login.css">
    <link rel="stylesheet" href="/password.css">
</head>
<body>
    <main class="login-card">
        <h1>solver</h1>
        <p class="subtitle">Change your password</p>

        <section id="form-section">
            <form id="password-form" novalidate>
                <label for="password">New password</label>
                <input id="password" name="password" type="password"
                       autocomplete="new-password" required autofocus>
                <label for="confirm">Confirm new password</label>
                <input id="confirm" name="confirm" type="password"
                       autocomplete="new-password" required>
                <p class="hint">At least 12 characters. Other devices will be signed out.</p>
                <button id="submit" type="submit">Update password</button>
            </form>
        </section>

        <section id="done" class="hidden">
            <p class="success">Password updated. <a href="/summary">Back to solver</a>.</p>
        </section>

        <p id="error" class="error" role="alert" aria-live="polite"></p>
        <p class="alt-link"><a href="/summary">Cancel</a></p>
    </main>
    <script type="module" src="/password.js"></script>
</body>
</html>
