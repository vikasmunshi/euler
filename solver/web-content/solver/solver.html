<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SolverShell</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="vendor/xterm.css">
    <!-- Theme variables; symlink to a solver-theme-*.css variant. Linked first so
         its :root vars are defined before solver.css and solver.js read them. -->
    <link rel="stylesheet" href="solver-theme.css">
    <link rel="stylesheet" href="solver.css">
</head>
<body>
<div id="user-menu" class="user-menu">
    <button id="user-btn" class="user-btn" type="button" title="connecting&hellip;"
            aria-haspopup="true" aria-expanded="false">
        <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
            <path fill="currentColor"
                  d="M12 12a5 5 0 1 0 0-10 5 5 0 0 0 0 10Zm0 2c-4.42 0-8 2.24-8 5v1h16v-1c0-2.76-3.58-5-8-5Z"/>
        </svg>
    </button>
    <div id="user-dropdown" class="user-dropdown" hidden>
        <button id="conn-toggle" type="button">Disconnect</button>
        <a href="/password">Change password</a>
        <a href="/logout">Log out</a>
    </div>
</div>
<div id="workspace">
    <!-- Viewer panel (left): hidden until the web `show` command reveals it
         (body.viewer-open). The iframe is same-origin, so its /NNNN/ request
         carries the session cookie. The shell sits to its right. -->
    <aside id="viewer" class="viewer" aria-label="problem viewer">
        <div class="viewer-bar">
            <span class="viewer-title">doc viewer</span>
            <button id="viewer-close" class="viewer-close" type="button"
                    title="Close viewer" aria-label="Close viewer">&times;</button>
        </div>
        <iframe id="viewer-frame" class="viewer-frame" title="problem viewer" src="about:blank"></iframe>
    </aside>
    <div id="terminal"></div>
</div>

<script src="vendor/xterm.js"></script>
<script src="vendor/addon-fit.js"></script>
<script src="solver.js"></script>
</body>
</html>
