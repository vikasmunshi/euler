<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>solver</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="vendor/xterm.css">
    <!-- Theme variables; symlink to a solver-theme-*.css variant. Linked first so
         its :root vars are defined before solver.css and solver.js read them. -->
    <link rel="stylesheet" href="solver-theme.css">
    <link rel="stylesheet" href="solver.css">
</head>
<body>
<!-- Uniform command bar across the whole page: the brand (a home link), the
     breadcrumb trail for the content pane, problem-relative quick jumps, the
     shell-bound Eval action, and the account menu. The bar is independent of whatever
     the iframe shows; it learns the current problem / file from the iframe via
     postMessage and drives the iframe from the breadcrumb + nav (see solver.js). -->
<header id="cmdbar">
    <!-- Fixed items (always available) -->
    <nav class="nav" id="nav">
        <span class="sep"></span>
        <a id="nav-euler" class="nav-dummy" title="View on Project Euler"
           target="_blank" rel="noopener noreferrer">&#8962;</a>
        <a id="nav-github" class="nav-dummy" title="View on GitHub"
           target="_blank" rel="noopener noreferrer">&#8857;</a>
        <span class="sep"></span>
        <a id="nav-index" title="Guides">&#8801;</a>
        <a id="nav-summary" title="Problems">&#9636;</a>
        <a id="nav-progress" title="Progress">&#9969;</a>
        <span class="sep"></span>
        <a id="nav-prev" class="nav-dummy" title="Previous problem">&laquo;</a>
        <a id="nav-active" title="Active problem">&#9671;</a>
        <a id="nav-next" class="nav-dummy" title="Next problem">&raquo;</a>
        <span class="sep"></span>
    </nav>
    <!-- Breadcrumb: root → current, built by solver.js from the iframe's context; each
         segment navigates the content pane. Sits on the left, right-anchored nav after
         the spacer so a growing trail never shifts the glyph buttons. -->
    <a class="brand" id="nav-home" title="Home" data-nav="/index"><span class="sig">&#8721;</span> solver</a>
    <nav class="breadcrumb" id="breadcrumb" aria-label="Breadcrumb"></nav>
    <span class="spacer"></span>
    <!-- SolverShell Commands -->
    <button id="bench-btn" type="button" hidden title="Benchmark this problem in the shell">benchmark</button>
    <button id="eval-btn" type="button" hidden title="Evaluate this problem in the shell">evaluate</button>
    <button id="show-btn" type="button" hidden title="Show this problem in the viewer">show</button>
    <span class="sep"></span>
    <!-- Fixed items (always available) -->
    <div class="user-menu" id="user-menu">
        <button id="user-btn" class="user-btn" type="button" title="connecting&hellip;"
                aria-haspopup="true" aria-expanded="false">
            <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
                <path fill="currentColor"
                      d="M12 12a5 5 0 1 0 0-10 5 5 0 0 0 0 10Zm0 2c-4.42 0-8 2.24-8 5v1h16v-1c0-2.76-3.58-5-8-5Z"/>
            </svg>
        </button>
        <div id="user-dropdown" class="user-dropdown" hidden>
            <button id="conn-toggle" type="button">Disconnect</button>
            <a href="/password">Change password</a>
            <a href="/logout">Log out</a>
        </div>
    </div>
</header>

<!-- Always-on split: the content iframe (left) beside the live terminal (right).
     The iframe is same-origin, so its requests carry the session cookie; the web
     `show` / `edit` commands navigate it via an OSC sequence (see solver.js). -->
<div id="workspace">
    <iframe id="content" title="content" src="/index"></iframe>
    <div id="terminal"></div>
</div>

<script src="vendor/xterm.js"></script>
<script src="vendor/addon-fit.js"></script>
<script src="solver.js"></script>
</body>
</html>
