<!-- Shared site header partial (standalone pages only; when embedded in the workspace
     shell, header.js hides this and the shell's command bar is the header). header.js
     fetches and injects it into #page-header and wires the nav links from the current
     problem number. Every glyph starts as an inert .nav-dummy; header.js promotes the
     ones with a real target to live links. -->
<a id="nav-prev" class="nav-dummy" title="Previous problem">&laquo;</a>
<a id="nav-problem" class="nav-dummy" title="Active problem">&#10063;</a>
<a id="nav-next" class="nav-dummy" title="Next problem">&raquo;</a>
<span class="nav-sep"></span>
<a id="nav-euler" class="nav-dummy" title="View on Project Euler">&#8962;</a>
<a id="nav-github" class="nav-dummy" title="View on GitHub">&#8857;</a>
<span class="nav-sep"></span>
<a id="nav-summary" class="nav-dummy" title="Summary">&#9776;</a>
<a id="nav-progress" class="nav-dummy" title="Progress">&#9749;</a>
<span class="header-spacer"></span>
<div class="user-menu" id="user-menu">
    <button id="user-btn" class="user-btn" type="button" title="Account"
            aria-haspopup="true" aria-expanded="false">
        <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
            <path fill="currentColor"
                  d="M12 12a5 5 0 1 0 0-10 5 5 0 0 0 0 10Zm0 2c-4.42 0-8 2.24-8 5v1h16v-1c0-2.76-3.58-5-8-5Z"/>
        </svg>
    </button>
    <div id="user-dropdown" class="user-dropdown" hidden>
        <a href="/password">Change password</a>
        <a href="/logout">Log out</a>
    </div>
</div>
