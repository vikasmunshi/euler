<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/html" lang="en">
<head>
    <meta charset="UTF-8">
    <title></title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/common.css">
    <link rel="stylesheet" href="/header.css">
    <link rel="stylesheet" href="/problem.css">
    <!-- header.js draws the shared nav bar into #page-header. problem.js sets window.MathJax
         before the deferred MathJax loader runs; all are deferred so they execute in document
         order (header.js, problem.js, then MathJax). -->
    <script defer src="/header.js"></script>
    <script defer src="/problem.js"></script>
    <script id="MathJax-script" defer src="/vendor/mathjax/tex-mml-chtml.js"></script>
</head>
<body>
<div id="page">
    <div id="page-header"></div>
    <!-- Output of the header's init / reset / eval buttons (problem.js); hidden until used. -->
    <pre id="cmd-output" hidden></pre>
    <section id="problem-statement">
        <div id="problem-statement-content"></div>
    </section>
    <section id="test-cases">
        <div id="test-cases-content">
            <h3><a id="test-cases-link" href="">Test Cases</a></h3>
            <div id="test-cases-body"></div>
        </div>
    </section>
    <section id="solutions">
        <div id="solutions-content">
            <h3>Solutions</h3>
            <div id="solutions-body"></div>
        </div>
    </section>
    <section id="solution-notes">
        <div id="solution-notes-content"></div>
    </section>
</div>
</body>
</html>
