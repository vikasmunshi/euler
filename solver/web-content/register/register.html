<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>solver · register</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/login.css">
    <link rel="stylesheet" href="/register.css">
</head>
<body>
    <main class="login-card">
        <h1>solver</h1>
        <p class="subtitle">Complete your registration</p>

        <section id="step1">
            <form id="verify-form" novalidate>
                <label for="email">Email</label>
                <input id="email" name="email" type="email" autocomplete="username"
                       required autofocus spellcheck="false">
                <label for="otp">Registration code</label>
                <input id="otp" name="otp" inputmode="numeric" autocomplete="one-time-code"
                       required spellcheck="false">
                <p class="hint">Enter the code sent to your email.</p>
                <button id="verify" type="submit">Verify code</button>
            </form>
        </section>

        <section id="step2" class="hidden">
            <form id="password-form" novalidate>
                <label for="password">Choose a password</label>
                <input id="password" name="password" type="password"
                       autocomplete="new-password" required>
                <label for="confirm">Confirm password</label>
                <input id="confirm" name="confirm" type="password"
                       autocomplete="new-password" required>
                <p class="hint">At least 12 characters.</p>
                <button id="create" type="submit">Create account</button>
            </form>
        </section>

        <section id="done" class="hidden">
            <p class="success">Account created. You can now <a href="/login">sign in</a>.</p>
        </section>

        <p id="error" class="error" role="alert" aria-live="polite"></p>
    </main>
    <script type="module" src="/register.js"></script>
</body>
</html>
