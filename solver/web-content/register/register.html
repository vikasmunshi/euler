<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>solver · register</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/login.css">
    <link rel="stylesheet" href="/register.css">
</head>
<body>
    <main class="login-card">
        <h1>solver</h1>
        <p class="subtitle">Set your password</p>

        <section id="checking">
            <p class="hint">Validating your link…</p>
        </section>

        <section id="invalid" class="hidden">
            <p class="error">This link is invalid or has expired. Ask an admin to send a new one.</p>
        </section>

        <section id="step-password" class="hidden">
            <form id="password-form" novalidate>
                <label for="account">Account</label>
                <input id="account" name="account" type="email" autocomplete="username"
                       readonly tabindex="-1">
                <label for="password">Choose a password</label>
                <input id="password" name="password" type="password"
                       autocomplete="new-password" required autofocus>
                <label for="confirm">Confirm password</label>
                <input id="confirm" name="confirm" type="password"
                       autocomplete="new-password" required>
                <div class="generator">
                    <button id="generate" type="button" class="secondary">Generate</button>
                    <input id="generated" type="text" readonly placeholder="a strong password"
                           spellcheck="false" tabindex="-1">
                    <button id="copy" type="button" class="secondary" hidden>Copy</button>
                    <button id="use" type="button" class="secondary" hidden>Use</button>
                </div>
                <p class="hint">At least 16 characters, with a lowercase and uppercase letter,
                   a digit, and a special character.</p>
                <button id="create" type="submit">Create account</button>
            </form>
        </section>

        <section id="done" class="hidden">
            <p class="success">Password set. You can now <a href="/login">sign in</a>.</p>
        </section>

        <p id="error" class="error" role="alert" aria-live="polite"></p>
    </main>
    <script type="module" src="/register.js"></script>
</body>
</html>
