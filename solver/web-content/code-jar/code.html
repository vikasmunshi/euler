<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{FILENAME}}</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/common.css">
    <link rel="stylesheet" href="/code.css">
    <!-- CodeMirror 6 ships its own gutter, syntax highlighting, bracket matching,
         autocompletion and search; no separate highlight.js theme is needed. -->
</head>
<body data-language="{{LANGUAGE}}">
<!-- The editor's own toolbar: filename, language badge, and the file-local Save / Del
     actions that code.js wires up. Eval is global (in the workspace command bar). -->
<div id="editor-bar">
    <span id="lang-badge" class="lang-badge" hidden></span>
    <span id="filename" class="filename"></span>
    <span class="bar-spacer"></span>
    <button id="save-btn" type="button" hidden disabled>save</button>
    <button id="del-btn" type="button" hidden disabled>del</button>
</div>
<pre id="save-output" hidden></pre>
<main id="code-view">
    <!-- CodeMirror mounts its EditorView (with its own gutter) inside #editor. -->
    <div id="editor"></div>
</main>
<!-- The HTML-escaped source; a textarea decodes the entities back to plain text. -->
<label for="source"></label><textarea id="source" hidden>{{CODE}}</textarea>
<!-- header.js draws the standalone nav bar and, when embedded, reports this page's
     context to the workspace command bar; code.js owns the editor and its toolbar. -->
<script src="/header.js"></script>
<script type="module" src="/code.js"></script>
</body>
</html>
