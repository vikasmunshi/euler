<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{FILENAME}}</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/common.css">
    <link rel="stylesheet" href="/header.css">
    <link rel="stylesheet" href="/code.css">
    <!-- CodeMirror 6 ships its own gutter, syntax highlighting, bracket matching,
         autocompletion and search; no separate highlight.js theme is needed. -->
</head>
<body data-language="{{LANGUAGE}}">
<!-- header.js injects the shared nav bar and (on this code page) the filename,
     language badge, and the Eval/Save/Del buttons that code.js wires up. -->
<div id="page-header"></div>
<pre id="save-output" hidden></pre>
<main id="code-view">
    <!-- CodeMirror mounts its EditorView (with its own gutter) inside #editor. -->
    <div id="editor"></div>
</main>
<!-- The HTML-escaped source; a textarea decodes the entities back to plain text. -->
<label for="source"></label><textarea id="source" hidden>{{CODE}}</textarea>
<!-- header.js (classic) defines window.SolverHeader before the deferred code.js module awaits it. -->
<script src="/header.js"></script>
<script type="module" src="/code.js"></script>
</body>
</html>
