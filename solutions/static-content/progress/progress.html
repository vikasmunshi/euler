<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>progress editor</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/common.css">
    <link rel="stylesheet" href="/header.css">
    <link rel="stylesheet" href="/progress.css">
</head>
<body>
<!-- header.js injects the shared nav bar; progress.js reuses its Save button. -->
<div id="page-header"></div>
<pre id="save-output" hidden></pre>
<textarea id="content" aria-label="progress file" spellcheck="false">{{CONTENT}}</textarea>
<!-- header.js (classic) defines window.SolverHeader before progress.js awaits it. -->
<script src="/header.js"></script>
<script src="/progress.js"></script>
</body>
</html>
