<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Sphere Packing</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; }
        .problem_content { line-height: 1.6; }
        var { font-style: italic; }
        sup { vertical-align: super; font-size: smaller; }
        sub { vertical-align: sub; font-size: smaller; }
        img { max-width: 100%; height: auto; }
        table { border-collapse: collapse; margin: 20px 0; }
        td, th { border: 1px solid #ddd; padding: 8px; }
    </style>
    <script>
        MathJax = {
            tex: {
                inlineMath: [["$", "$"]],
                displayMath: [["$$", "$$"]]
            }
        };
    </script>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body>
    <h1>Sphere Packing</h1>
    <div class="problem_content" role="problem">
<p>What is the length of the shortest pipe, of internal radius $\pu{50 mm}$, that can fully contain $21$ balls of radii $\pu{30 mm}, \pu{31 mm}, \dots, \pu{50 mm}$?</p>
<p>Give your answer in micrometres ($\pu{10^{-6} m}$) rounded to the nearest integer.</p>
</div>
</body>
</html>
