    <div class="problem_content" role="problem">
<p>A sequence is defined as:</p>
<p>
</p><ul><li>$g_k = 1$, for $0 \le k \le 1999$</li>
<li>$g_k = g_{k-2000} + g_{k - 1999}$, for $k \ge 2000$.
</li></ul><p>Find $g_k \bmod 20092010$ for $k = 10^{18}$.</p>
